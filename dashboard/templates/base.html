<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}OpportunityScout{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="topnav">
    <div class="nav-inner">
      <a href="/" class="brand">🎯 OpportunityScout</a>
      <div class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/pipeline">Pipeline</a>
        <a href="/analytics">Analytics</a>
        <form method="get" action="/search" class="search-form">
          <input type="text" name="q" placeholder="Search..." value="{{ request.query_params.get('q','') }}">
        </form>
      </div>
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer>
    <small>OpportunityScout Dashboard · {{ request.url.path }}</small>
  </footer>
</body>
</html>
