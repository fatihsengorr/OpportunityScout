# OpportunityScout — Forced Sector Rotation Schedule
# Ensures every capability cluster gets explored monthly.
# Construction is NOT on rotation — it gets enough coverage from RSS sources.
# Used by: Serendipity Engine (Strategy 2 & 3), Web Scanner (dynamic queries)

rotation:
  # Week number within the month (1-4)
  week_1:
    name: "IT Infrastructure & Cybersecurity"
    sectors:
      - managed IT services
      - cybersecurity consulting
      - SOC as a service
      - remote work infrastructure
      - VDI solutions
      - network monitoring
