# OpportunityScout — Regulatory Calendar
# Known regulatory deadlines that create business opportunities
# Updated monthly via temporal intelligence module

deadlines:

  # ─── UK Building Safety ─────────────────────────────────
  - name: "BSA Golden Thread (Building Safety Act)"
    deadline_date: "2026-10-01"
    description: "All higher-risk buildings must maintain a digital golden thread of building information"
    capabilities: [construction, it_infrastructure, ai_software]
    impact: "Massive — every HRB needs digital records. BIM/digital twin demand explosion."
    search_queries:
      - "Building Safety Act golden thread compliance tools"
      - "BSA digital records software UK"
      - "golden thread building information management"
    regions: [uk]

  - name: "MEES EPC-C Minimum Standard"
    deadline_date: "2027-04-01"
    description: "Rented commercial properties must achieve minimum EPC rating C"
    capabilities: [construction, manufacturing]
    impact: "Retrofitting wave for commercial properties. Energy efficiency services demand."
    search_queries:
      - "MEES EPC-C compliance deadline UK commercial"
      - "energy performance certificate upgrading services"
    regions: [uk]

