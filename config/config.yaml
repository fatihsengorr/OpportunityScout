# OpportunityScout Configuration
# Copy to config.yaml and fill in your values

# ─── Claude API ───────────────────────────────────────────
claude:
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-sonnet-4-20250514"        # Sonnet for routine scans (cost-effective)
  model_deep_dive: "claude-opus-4-20250514" # Opus for deep dives (maximum intelligence)
  max_tokens: 4096
  max_tokens_deep_dive: 8192

# ─── Telegram ─────────────────────────────────────────────
telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"
  # Alert thresholds
  instant_alert_threshold: 125  # Score >= this triggers instant message
  daily_digest_time: "08:00"    # UTC time for daily digest
  weekly_report_day: "monday"
  weekly_report_time: "09:00"

# ─── Knowledge Base ───────────────────────────────────────
database:
  path: "./data/opportunity_scout.db"
  backup_interval_hours: 24

# ─── n8n Integration ──────────────────────────────────────
n8n:
  base_url: "http://localhost:5678"
  webhook_secret: "${N8N_WEBHOOK_SECRET}"
  # Webhook endpoints (created by n8n workflows)
  webhooks:
    trigger_scan: "/webhook/scout-scan"
    trigger_deep_dive: "/webhook/scout-deep-dive"
    receive_results: "/webhook/scout-results"

# ─── Scanning Schedule ────────────────────────────────────
schedule:
  daily_scan: "0 6 * * *"        # Every day at 06:00 UTC
  weekly_deep_dive: "0 3 * * 1"  # Every Monday at 03:00 UTC
  evolution_cycle: "0 2 * * 0"   # Every Sunday at 02:00 UTC
  source_health_check: "0 12 * * 3"  # Every Wednesday at noon

# ─── Scoring Weights ─────────────────────────────────────
# These evolve over time via the self-improvement loop
scoring:
  weights:
    # NOTE: founder_fit is a MULTIPLIER, not an additive weight.
    # Do not add founder_fit here. Max base = 155 × (founder_fit/10).
    ai_unlock: 2.5
    time_to_revenue: 2.5
    capital_efficiency: 2.0
    market_timing: 2.0
    defensibility: 1.5
    scale_potential: 1.5
    geographic_leverage: 1.5
    competition_gap: 1.0
    simplicity: 1.0

  # Tier thresholds (weighted total)
  tiers:
    fire: 125      # 80% of max — genuinely exceptional
    high: 100      # 65% — strong opportunities
    medium: 75     # 48% — worth evaluating

# ─── Serendipity Engine ───────────────────────────────────
serendipity:
  min_founder_fit: 5          # Only show opportunities with FF ≥ this
  daily_enabled: true          # Run daily light scan
  weekly_deep_enabled: true    # Run weekly deep analysis

# ─── Rate Limiting ────────────────────────────────────────
rate_limits:
  max_api_calls_per_hour: 50
  max_web_requests_per_minute: 10
  delay_between_sources_seconds: 3
  
# ─── Logging ──────────────────────────────────────────────
logging:
  level: "INFO"
  file: "./logs/scout.log"
  max_size_mb: 50
  backup_count: 5
