# OpportunityScout Configuration
# Copy to config.yaml and fill in your values

# ─── LLM Providers ────────────────────────────────────────
claude:
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-sonnet-4-20250514"
  model_deep_dive: "claude-sonnet-4-20250514"  # Was Opus — Sonnet is 5x cheaper and sufficient
  max_tokens: 4096
  max_tokens_deep_dive: 8192

gemini:
  api_key: "${GEMINI_API_KEY}"

# ─── Model Routing (which model for which task) ──────────
# daily: Gemini Flash ($0.15/M) — web search + opportunity discovery
# weekly: Claude Sonnet ($3/M) — deep analysis + creative reasoning
# scoring: Claude Sonnet — reliable structured output for scoring
models:
  daily: "gemini-2.5-flash"
  weekly: "claude-sonnet-4-20250514"
  scoring: "claude-sonnet-4-20250514"

# ─── Telegram ─────────────────────────────────────────────
telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"
  # Alert thresholds
  instant_alert_threshold: 125  # Score >= this triggers instant message
  daily_digest_time: "08:00"    # UTC time for daily digest
  weekly_report_day: "monday"
  weekly_report_time: "09:00"

# ─── Knowledge Base ───────────────────────────────────────
database:
  path: "./data/opportunity_scout.db"
  backup_interval_hours: 24

# ─── n8n Integration ──────────────────────────────────────
n8n:
  base_url: "http://localhost:5678"
  webhook_secret: "${N8N_WEBHOOK_SECRET}"
  # Webhook endpoints (created by n8n workflows)
  webhooks:
    trigger_scan: "/webhook/scout-scan"
    trigger_deep_dive: "/webhook/scout-deep-dive"
    receive_results: "/webhook/scout-results"

# ─── Scanning Schedule ────────────────────────────────────
schedule:
  daily_scan: "0 6 * * *"        # Every day at 06:00 UTC
  weekly_deep_dive: "0 3 * * 1"  # Every Monday at 03:00 UTC
  evolution_cycle: "0 2 * * 0"   # Every Sunday at 02:00 UTC
  source_health_check: "0 12 * * 3"  # Every Wednesday at noon

# ─── Scoring Weights ─────────────────────────────────────
# These evolve over time via the self-improvement loop
scoring:
  weights:
    # NOTE: founder_fit is a MULTIPLIER, not an additive weight.
    # Do not add founder_fit here. Max base = 155 × (founder_fit/10).
    ai_unlock: 2.5
    time_to_revenue: 2.5
    capital_efficiency: 2.0
    market_timing: 2.0
    defensibility: 1.5
    scale_potential: 1.5
    geographic_leverage: 1.5
    competition_gap: 1.0
    simplicity: 1.0

  # Tier thresholds (weighted total)
  tiers:
    fire: 125      # 80% of max — genuinely exceptional
    high: 100      # 65% — strong opportunities
    medium: 75     # 48% — worth evaluating

# ─── Expand Mode — Discover outside current sectors ──────
# Fatih's explicit goal (17 April 2026):
# "Benim hedefim benim sektörlerimin dışında sonuçlar bulmak"
# All discovery engines read founder_profile.yaml which embeds these lists
# in every prompt. This config block is informational / machine-readable.
founder:
  expand_mode: true

  # Sectors Fatih is already active in — discovery engines EXCLUDE these
  current_sectors:
    - construction
    - fit-out / contract furniture
    - fire doors / fire safety
    - building safety act (BSA) / golden thread
    - BTR furniture
    - coil coating / specialty paint production
    - IT managed services (VDI, VMware, Cisco)

  # Sectors Fatih wants to EXPAND into
  target_sectors:
    - biotech / life sciences / longevity
    - fintech / regtech (non-construction)
    - consumer DTC / D2C brands
    - AI infrastructure / developer tools
    - materials science / green chemistry / bio-based polymers
    - e-commerce / marketplaces / cross-border arbitrage
    - medical devices / diagnostics / digital health
    - chemistry (non-coating — adhesives, polymers, cosmetics, food ingredients)
    - education tech (niche UK/TR)
    - cybersecurity (non-construction)

  # Mode 1 (ThreadForge feed) handles current_sectors
  # Mode 2 (unicorn) + serendipity + localize + horizon focus on target_sectors

# ─── Serendipity Engine ───────────────────────────────────
serendipity:
  min_founder_fit: 5          # Only show opportunities with FF ≥ this
  daily_enabled: true          # Run daily light scan
  weekly_deep_enabled: true    # Run weekly deep analysis

# ─── Horizon Scanner (7-Lens Unbounded Discovery) ─────────
horizon:
  min_founder_fit: 4            # Lower than serendipity — we want breadth
  daily_enabled: true
  weekly_deep_enabled: true

# ─── Rate Limiting ────────────────────────────────────────
rate_limits:
  max_api_calls_per_hour: 50
  max_web_requests_per_minute: 10
  delay_between_sources_seconds: 3
  
# ─── Logging ──────────────────────────────────────────────
logging:
  level: "INFO"
  file: "./logs/scout.log"
  max_size_mb: 50
  backup_count: 5
